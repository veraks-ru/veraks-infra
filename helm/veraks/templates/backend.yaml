apiVersion: v1
kind: Service
metadata:
  name: veraks-backend
  labels:
    {{- include "veraks.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: veraks
    veraks/component: backend
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: veraks-backend
  labels:
    {{- include "veraks.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: veraks
      veraks/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: veraks
        veraks/component: backend
    spec:
      initContainers:
        # Ждём Postgres и применяем миграции ДО старта бэкенда. Конфиг доступен
        # (Secret/ConfigMap — обычные ресурсы релиза). Идемпотентно (1 реплика).
        - name: migrate
          image: "{{ .Values.images.backend.repository }}:{{ .Values.images.backend.tag }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          command:
            - sh
            - -c
            - |
              until python -c "import asyncio,asyncpg,os,urllib.parse as u; \
                p=u.urlparse(os.environ['DATABASE_URL'].replace('+asyncpg','')); \
                asyncio.run(asyncpg.connect(host=p.hostname,port=p.port or 5432,user=p.username,password=p.password,database=p.path[1:]))" 2>/dev/null; do
                echo "ожидаю Postgres..."; sleep 2;
              done
              alembic upgrade head
          envFrom:
            - configMapRef:
                name: veraks-config
            - secretRef:
                name: veraks-secrets
      containers:
        - name: backend
          image: "{{ .Values.images.backend.repository }}:{{ .Values.images.backend.tag }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
          envFrom:
            - configMapRef:
                name: veraks-config
            - secretRef:
                name: veraks-secrets
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
