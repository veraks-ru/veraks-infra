apiVersion: v1
kind: Service
metadata:
  name: veraks-goctopus
  labels:
    {{- include "veraks.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: veraks
    veraks/component: goctopus
  ports:
    - port: 7890
      targetPort: 7890
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: veraks-goctopus
  labels:
    {{- include "veraks.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: veraks
      veraks/component: goctopus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: veraks
        veraks/component: goctopus
    spec:
      containers:
        - name: goctopus
          image: "{{ .Values.images.goctopus.repository }}:{{ .Values.images.goctopus.tag }}"
          env:
            - name: WS_HOST
              value: "0.0.0.0"
            - name: WS_PORT
              value: "7890"
            - name: WS_LOGIN
              value: {{ .Values.env.goctopusUser | quote }}
            - name: WS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: veraks-secrets
                  key: GOCTOPUS_PASSWORD
            # Авторизация подписки на канал — эндпоинт бэкенда (внутренний).
            - name: WS_AUTH_URL
              value: "http://veraks-backend:8000/realtime/ws-auth"
            - name: WS_STORAGE
              value: "memory"
            - name: WS_ALLOWED_ORIGINS
              value: "https://{{ .Values.domains.app }}"
          ports:
            - containerPort: 7890
          resources:
            {{- toYaml .Values.goctopus.resources | nindent 12 }}
