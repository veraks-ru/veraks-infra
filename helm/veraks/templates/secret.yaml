apiVersion: v1
kind: Secret
metadata:
  name: veraks-secrets
  labels:
    {{- include "veraks.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Криптоключи ПДн и сессий (задаются из GitHub Secrets на деплое).
  SECURITY_SNILS_HMAC_KEY: {{ .Values.secrets.snilsHmacKey | quote }}
  SECURITY_FIELD_ENCRYPTION_KEY: {{ .Values.secrets.fieldEncryptionKey | quote }}
  SECURITY_JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  # Единая транзакционная БД (пароль вшит в URL).
  DATABASE_URL: {{ include "veraks.databaseUrl" . | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}
  # Вебхуки провайдеров: вне env=local валидатор конфига требует НЕПУСТЫЕ секреты
  # (для мок-демо — любые непустые значения).
  WEBHOOK_YOOKASSA_PAYMENT_SECRET: {{ .Values.secrets.webhookPaymentSecret | quote }}
  WEBHOOK_YOOKASSA_PAYOUT_SECRET: {{ .Values.secrets.webhookPayoutSecret | quote }}
  # Пароль реле реал-тайм уведомлений (goctopus).
  GOCTOPUS_PASSWORD: {{ .Values.secrets.goctopusPassword | quote }}
  # Эквайринг ТБанк: Terminal Key и пароль терминала (из GitHub Secrets).
  TBANK_TERMINAL_KEY: {{ .Values.secrets.tbankTerminalKey | quote }}
  TBANK_PASSWORD: {{ .Values.secrets.tbankPassword | quote }}
