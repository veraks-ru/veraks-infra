apiVersion: v1
kind: Service
metadata:
  name: veraks-postgres
  labels:
    {{- include "veraks.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: veraks
    veraks/component: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: veraks-postgres
  labels:
    {{- include "veraks.labels" . | nindent 4 }}
spec:
  serviceName: veraks-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: veraks
      veraks/component: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: veraks
        veraks/component: postgres
    spec:
      containers:
        - name: postgres
          image: "{{ .Values.images.postgres.repository }}:{{ .Values.images.postgres.tag }}"
          env:
            - name: POSTGRES_USER
              value: veraks
            - name: POSTGRES_DB
              value: veraks
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: veraks-secrets
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "veraks", "-d", "veraks"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      {{- if not .Values.postgres.persistence }}
      # Демо: эфемерный том (без StorageClass/PV). Данные живут, пока жив под.
      volumes:
        - name: data
          emptyDir: {}
      {{- end }}
  {{- if .Values.postgres.persistence }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.postgres.storageClassName }}
        storageClassName: {{ . | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgres.storage }}
  {{- end }}
