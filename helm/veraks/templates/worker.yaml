apiVersion: apps/v1
kind: Deployment
metadata:
  name: veraks-worker
  labels:
    {{- include "veraks.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: veraks
      veraks/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: veraks
        veraks/component: worker
    spec:
      initContainers:
        # Ждём Postgres (миграции применит бэкенд); стартуем воркер после БД.
        - name: wait-db
          image: "{{ .Values.images.backend.repository }}:{{ .Values.images.backend.tag }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          command:
            - sh
            - -c
            - |
              until python -c "import asyncio,asyncpg,os,urllib.parse as u; \
                p=u.urlparse(os.environ['DATABASE_URL'].replace('+asyncpg','')); \
                asyncio.run(asyncpg.connect(host=p.hostname,port=p.port or 5432,user=p.username,password=p.password,database=p.path[1:]))" 2>/dev/null; do
                echo "ожидаю Postgres..."; sleep 2;
              done
          envFrom:
            - secretRef:
                name: veraks-secrets
      containers:
        - name: worker
          image: "{{ .Values.images.backend.repository }}:{{ .Values.images.backend.tag }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          # ARQ-воркер: фоновый скоринг, roll сезонов, закрытие окон, сверка леджера.
          command: ["arq", "app.worker.WorkerSettings"]
          envFrom:
            - configMapRef:
                name: veraks-config
            - secretRef:
                name: veraks-secrets
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
