apiVersion: v1
kind: Service
metadata:
  name: veraks-frontend
  labels:
    {{- include "veraks.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: veraks
    veraks/component: frontend
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: veraks-frontend
  labels:
    {{- include "veraks.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: veraks
      veraks/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: veraks
        veraks/component: frontend
    spec:
      containers:
        - name: frontend
          # Публичные URL (NEXT_PUBLIC_API_BASE / NEXT_PUBLIC_GOCTOPUS_URL) вшиты в
          # бандл на этапе сборки образа (build-args в GitHub Actions) — рантайм-env
          # фронту не нужен.
          image: "{{ .Values.images.frontend.repository }}:{{ .Values.images.frontend.tag }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
