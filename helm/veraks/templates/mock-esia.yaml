apiVersion: v1
kind: Service
metadata:
  name: veraks-mock-esia
  labels:
    {{- include "veraks.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: veraks
    veraks/component: mock-esia
  ports:
    - port: 9000
      targetPort: 9000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: veraks-mock-esia
  labels:
    {{- include "veraks.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: veraks
      veraks/component: mock-esia
  template:
    metadata:
      labels:
        app.kubernetes.io/name: veraks
        veraks/component: mock-esia
    spec:
      containers:
        - name: mock-esia
          # Демо-мок «Госуслуг»: страница выбора учётной записи + token/userinfo.
          # Заменяется на реальный ЕСИА-шлюз при боевой интеграции (см. infra/README).
          image: "{{ .Values.images.mockEsia.repository }}:{{ .Values.images.mockEsia.tag }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - containerPort: 9000
          resources:
            {{- toYaml .Values.mockEsia.resources | nindent 12 }}
